<style>
  :root {
    --app-red: #b5121b;
    --app-red-dark: #8f0e15;
    --app-red-soft: #f7e8ea;
    --app-ink: #263238;
    --app-muted: #60717d;
    --app-light: #f3f5f7;
    --app-surface: #ffffff;
    --app-border: #d9e0e5;
  }

  body {
    background:
      linear-gradient(180deg, #ffffff 0, var(--app-light) 220px),
      var(--app-light);
    color: var(--app-ink);
  }

  .app-navbar {
    background: var(--app-surface);
    border-bottom: 4px solid var(--app-red);
    box-shadow: 0 4px 18px rgba(38, 50, 56, 0.08);
    color: var(--app-ink);
    min-height: 72px;
  }

  .app-navbar .navbar-brand,
  .app-navbar .navbar-text {
    color: var(--app-ink);
  }

  .app-navbar .navbar-brand {
    font-size: 1.05rem;
    font-weight: 700;
  }

  .app-navbar .navbar-text {
    color: var(--app-muted);
    font-size: 0.95rem;
  }

  .app-navbar-logo {
    background: var(--app-surface);
    height: 35px;
    width: auto;
  }

  .app-shell {
    background: var(--app-surface);
    border: 1px solid var(--app-border);
    border-radius: 8px;
    box-shadow: 0 16px 40px rgba(38, 50, 56, 0.08);
    padding: 1.5rem;
  }

  .app-card {
    border: 1px solid var(--app-border);
    border-top: 4px solid var(--app-red);
    border-radius: 8px;
    box-shadow: 0 10px 26px rgba(38, 50, 56, 0.07);
    transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
  }

  .app-card:hover {
    border-color: #c6d0d8;
    box-shadow: 0 14px 34px rgba(38, 50, 56, 0.12);
    transform: translateY(-2px);
  }

  .app-loading-panel {
    border: 1px dashed #c7d1d9;
    border-radius: 8px;
    padding: 1rem;
    background: #fafbfc;
  }

  .app-form-table {
    min-width: 620px;
  }

  .app-form-table th,
  .app-form-table td {
    white-space: nowrap;
  }

  .app-card-icon {
    color: var(--app-red);
    font-size: 2rem;
    line-height: 1;
  }

  .app-state-icon {
    color: var(--app-red);
    font-size: 2rem;
    line-height: 1;
  }

  .app-spinner {
    color: var(--app-red);
  }

  h1,
  h2,
  h3,
  .h3,
  .h4,
  .h5,
  .h6 {
    color: var(--app-ink);
  }

  .text-secondary {
    color: var(--app-muted) !important;
  }

  .form-control,
  .form-select {
    border-color: #cfd8df;
    border-radius: 6px;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: var(--app-red);
    box-shadow: 0 0 0 0.2rem rgba(181, 18, 27, 0.15);
  }

  .table {
    --bs-table-hover-bg: #f8ecee;
    border-color: var(--app-border);
  }

  .table thead th {
    background: #f6f8fa;
    border-bottom-color: #cbd5dd;
    color: var(--app-ink);
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .table tbody td {
    border-color: #edf0f2;
  }

  .badge.text-bg-light {
    background: var(--app-red-soft) !important;
    color: var(--app-red-dark) !important;
  }

  .btn-primary {
    --bs-btn-bg: var(--app-red);
    --bs-btn-border-color: var(--app-red);
    --bs-btn-hover-bg: var(--app-red-dark);
    --bs-btn-hover-border-color: var(--app-red-dark);
    --bs-btn-disabled-bg: var(--app-red);
    --bs-btn-disabled-border-color: var(--app-red);
  }

  .btn-outline-primary {
    --bs-btn-color: var(--app-red);
    --bs-btn-border-color: var(--app-red);
    --bs-btn-hover-bg: var(--app-red);
    --bs-btn-hover-border-color: var(--app-red);
    --bs-btn-active-bg: var(--app-red-dark);
    --bs-btn-active-border-color: var(--app-red-dark);
  }

  .btn-outline-secondary {
    --bs-btn-color: var(--app-ink);
    --bs-btn-border-color: #b8c4cc;
    --bs-btn-hover-bg: #eef2f5;
    --bs-btn-hover-border-color: #aebbc4;
    --bs-btn-hover-color: var(--app-ink);
  }

  .btn-outline-light {
    --bs-btn-color: var(--app-red);
    --bs-btn-border-color: var(--app-red);
    --bs-btn-hover-bg: var(--app-red);
    --bs-btn-hover-border-color: var(--app-red);
    --bs-btn-hover-color: #fff;
  }

  .alert {
    border-radius: 8px;
  }

  .alert-info {
    background: #eef6fb;
    border-color: #cfe7f5;
    color: #24485d;
  }

  .alert-success {
    background: #edf7ef;
    border-color: #cfe8d4;
    color: #28563a;
  }

  .alert-warning {
    background: #fff7e6;
    border-color: #f1dfb6;
    color: #654d16;
  }

  .alert-danger {
    background: var(--app-red-soft);
    border-color: #efc4c8;
    color: var(--app-red-dark);
  }

  .modal-content {
    border: 0;
    border-radius: 8px;
    box-shadow: 0 22px 60px rgba(38, 50, 56, 0.25);
  }

  .modal-header {
    border-bottom-color: var(--app-border);
  }
</style>
