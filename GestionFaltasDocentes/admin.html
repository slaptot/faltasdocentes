<section id="view-admin" class="d-none">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
    <div>
      <h2 class="h4 mb-1">Administración</h2>
      <p class="text-secondary mb-0">Listados mensuales, búsqueda por docente y tipo de ausencia.</p>
    </div>
    <button class="btn btn-outline-secondary" type="button" data-view-target="menu">
      <i class="bi bi-arrow-left"></i>
      Volver
    </button>
  </div>

  <form class="row g-3 mb-4" id="admin-filters-form">
    <div class="col-12 col-md-2">
      <label class="form-label" for="admin-filter-year">Año</label>
      <input class="form-control" id="admin-filter-year" type="number" min="2020" max="2100" step="1">
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label" for="admin-filter-month">Mes</label>
      <input class="form-control" id="admin-filter-month" type="month">
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label" for="admin-filter-profesor">Docente</label>
      <input class="form-control" id="admin-filter-profesor" type="search" placeholder="Nombre o correo">
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label" for="admin-filter-tipo">Tipo de ausencia</label>
      <select class="form-select" id="admin-filter-tipo">
        <option value="">Todos los tipos</option>
      </select>
    </div>
    <div class="col-12 d-flex justify-content-end gap-2">
      <button class="btn btn-outline-secondary" id="admin-clear-filters" type="button">
        <i class="bi bi-eraser"></i>
        Limpiar
      </button>
      <button class="btn btn-outline-primary" id="admin-export-csv" type="button">
        <i class="bi bi-download"></i>
        Exportar CSV
      </button>
      <button class="btn btn-primary" type="submit">
        <i class="bi bi-search"></i>
        Buscar
      </button>
    </div>
  </form>

  <div class="app-loading-panel" id="admin-loading-state">
    <div class="d-flex align-items-center gap-3">
      <div class="spinner-border app-spinner" role="status" aria-hidden="true"></div>
      <div>
        <h3 class="h6 mb-1">Cargando solicitudes</h3>
        <p class="text-secondary mb-0">Recuperando solicitudes registradas.</p>
      </div>
    </div>
  </div>

  <div class="alert d-none" id="admin-alert" role="alert"></div>

  <div class="table-responsive d-none" id="admin-table-wrapper">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
      <div class="d-flex align-items-center gap-2">
        <label class="form-label mb-0" for="admin-page-size">Mostrar</label>
        <select class="form-select form-select-sm app-page-size" id="admin-page-size">
          <option value="10" selected>10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <span class="text-secondary">solicitudes</span>
      </div>
      <div class="small text-secondary" id="admin-pagination-summary"></div>
    </div>
    <table class="table table-hover align-middle">
      <thead>
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Fecha</th>
          <th scope="col">Horario</th>
          <th scope="col">Docente</th>
          <th scope="col">Tipo</th>
          <th scope="col">Estado</th>
          <th scope="col">Razón</th>
          <th scope="col">PDF</th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody id="admin-body"></tbody>
    </table>
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mt-3">
      <div class="small text-secondary" id="admin-pagination-page"></div>
      <nav aria-label="Paginación de solicitudes">
        <div class="btn-group btn-group-sm" role="group">
          <button class="btn btn-outline-secondary" id="admin-page-prev" type="button">
            <i class="bi bi-chevron-left"></i>
            Anterior
          </button>
          <button class="btn btn-outline-secondary" id="admin-page-next" type="button">
            Siguiente
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
      </nav>
    </div>
  </div>

  <div class="modal fade" id="admin-resolution-modal" tabindex="-1" aria-labelledby="admin-resolution-title" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="admin-resolution-form">
          <div class="modal-header">
            <h3 class="modal-title h5" id="admin-resolution-title">Resolver solicitud</h3>
            <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <p class="text-secondary mb-3" id="admin-resolution-summary"></p>
            <label class="form-label" for="admin-resolution-reason" id="admin-resolution-reason-label">Razón de la resolución</label>
            <textarea class="form-control" id="admin-resolution-reason" rows="4"></textarea>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">
              <i class="bi bi-check2"></i>
              Guardar resolución
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
